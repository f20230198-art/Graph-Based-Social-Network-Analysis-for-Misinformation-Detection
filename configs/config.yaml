# PropNet Configuration

data:
  raw_dir: "data/raw/FakeNewsNet"
  processed_dir: "data/processed"
  embeddings_dir: "data/embeddings"
  datasets:
    - "politifact"
    - "gossipcop"

preprocessing:
  text:
    max_length: 256
    min_text_length: 10
    language: "en"
  cascade:
    min_size: 10
    max_size: 10000
    min_depth: 2
    window_days: 7

model:
  text_encoder: "roberta-base"
  text_dim: 797
  gnn_hidden_dim: 128
  gnn_heads: 8
  num_edge_types: 6
  classifier_dropout: [0.5, 0.3]

training:
  text_lr: 2.0e-5
  gnn_lr: 1.0e-3
  optimizer: "adamw"
  batch_size: 32
  max_epochs: 50
  early_stopping_patience: 10
  scheduler: "reduce_on_plateau"

evaluation:
  metrics:
    - "accuracy"
    - "f1_macro"
    - "f1_weighted"
    - "roc_auc"
    - "precision"
    - "recall"
